<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Productos - LUAR</title>
</head>
<body>

    <div class="contenedor">

        <aside class="sidebar">
            <img src="./Imag/logo2.png" alt="Logo de LUAR" class="logo">

            <h1 class="titulo-logo">LUAR</h1>

            <p class="eslogan">Luz de Luna</p>
        
        <nav class="menu-lateral">
            <a href="index.html">Inicio</a> 
            <a href="productos.html">Productos</a> 
            <a href="contacto.html">Contacto</a>
        </nav>
        </aside>
    
<main class="principal">
    <section class="productos-titulo">
        <h2>Nuestros productos</h2>
        
        <p>
            Elegí tus medias favoritas.
        </p>

    </section>
    <section class="productos-layout">

        <aside class="filtros">
            <h3>Diseños</h3>

            <label>
                <input type="checkbox">
                Animadas
            </label>

            <label>
                <input type="checkbox">
                Deportivas
            </label>

            <label>
                <input type="checkbox">
                Básicas
            </label>

            <h3>Marcas</h3>

            <label>
                <input type="checkbox">
                Adidas
            </label>

            <label>
                <input type="checkbox">
                Nike
            </label>

            <label>
                <input type="checkbox">
                Alo
            </label>

            <h3>Tipo</h3>

            <label>
                <input type="checkbox">
                3/4
            </label>

            <label>
                <input type="checkbox">
                Soquetes
            </label>

            <label>
                <input type="checkbox">
                Infantiles
            </label>
        </aside>

        <section class="productos-grid">

            <article class="card">
                <img src="./Imag/Adida 02.jpeg" alt="Media Adidas">

                <h3>Medias Adidas</h3>
                <p>$2000</p>

                <a href="./contacto.html" class="btn-card">
                    Agregar
                </a>
            </article>

            <article class="card">
                <img src="./Imag/Nike 01.jpeg" alt="Media Nike">

                <h3>Media Nike</h3>
                <p>$2500</p>
                <a href="./contacto.html" class="btn-card">
                    Agregar
                </a>
            </article>

            <article class="card">

                <img src="./Imag/Alo 03.jpeg" alt="Media Alo">

                <h3>Diseño Alo</h3>
                <p>$3000</p>

                <a href="./contacto.html" class="btn-card">
                    Agregar
                </a>
            </article>

            <article class="card">

                <img src="./Imag/Nike_basica.jpeg" alt="Nike basica">

                <h3>Media Básica</h3>
                <p>$3500</p>

                <a href="./contacto.html" class="btn-card">
                    Agregar
                </a>
            </article>
        </section>
    </section>    
    <footer class="footer">
    <p>
        LUAR - Luz de Luna
    </p>
    </footer>
</main>
</div>

</body>
</html>
